spring:
  jpa:
    open-in-view: false
    properties.hibernate:
      jdbc.batch_size: 10
      order_inserts: true
      order_updates: true

  kotlinx:
    serialization:
      json:
        encode-defaults: true

scalar:
  # NOTE: does not work without a reverse proxy adding /api
  # Might be better to externalise, but this is the easy way.
  # Custom deployments could always override this setting :>
  enabled: true
  telemetry: false
  path: documentation
  url: ./openapi.json
  document-download-type: direct
  agent:
    # IJ fails to detect the properties of `scalar.agent`
    # noinspection SpringBootApplicationYaml
    disabled: true

springdoc:
  api-docs:
    path: /openapi.json
  packages-to-scan:
    - org.elaastix
  paths-to-exclude:  # Overridden in the develop profile, so the generated types for the Nuxt app include these.
    - /v*/internal/**
  disable-i18n: true
  enable-groovy: false
  enable-hateoas: false
  enable-data-rest: false
  explicit-object-schema: true
  # Might want to revisit that once we actually enable "dual stack" JSON and CBOR support
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,scalar
