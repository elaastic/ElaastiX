spring:
  data:
    web:
      pageable:
        max-page-size: 50

  jpa:
    open-in-view: false
    hibernate.ddl-auto: validate
    properties.hibernate:
      jdbc.batch_size: 10
      order_inserts: true
      order_updates: true

  kotlinx:
    serialization:
      json:
        encode-defaults: true
        class-discriminator: $type

scalar:
  enabled: true
  telemetry: false
  path: documentation
  url: ./openapi.json
  page-title: Elaastix Platform API Reference
  agent: # noinspection SpringBootApplicationYaml
    disabled: true
  authentication: # noinspection SpringBootApplicationYaml
    preferred-security-scheme: auth-token

springdoc:
  api-docs:
    path: /openapi.json
    enabled: true
  packages-to-scan:
    - org.elaastix
  paths-to-exclude:  # Overridden in the develop profile, so the generated types for the Nuxt app include these.
    - /v*/internal/**
  disable-i18n: true
  explicit-object-schema: true
  # Might want to revisit that once we actually enable "dual stack" JSON and CBOR support
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,scalar

elaastix:
  security:
    cookie-secure: true
