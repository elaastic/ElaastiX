name: Lint

permissions:
  contents: read

concurrency: # Green Software Engineering Practices: https://github.com/Cambridge-ICCS/green-ci
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:

jobs:
  typos:
    name: Typos
    timeout-minutes: 5
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - run: typos -c .config/typos/config.toml

  toml:
    name: TOML
    timeout-minutes: 5
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - run: taplo format --check
      - run: taplo lint

  actionlint:
    name: GitHub Actions (actionlint)
    timeout-minutes: 5
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - run: actionlint

  zizmor:
    name: GitHub Actions (zizmor)
    timeout-minutes: 5
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - run: zizmor -p .

  kotlin:
    name: Kotlin lint
    timeout-minutes: 15
    runs-on: ubuntu-slim
    permissions:
      contents: read
      security-events: write  # Required to upload Code Quality reports (they're all folded under the Advanced Security umbrella, hence the perm name)
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - uses: gradle/actions/setup-gradle@v6

      - run: ./gradlew detekt

      - name: Upload SARIF report to GitHub CodeQL
        uses: github/codeql-action/upload-sarif@v4
        if: success() || failure()
        with:
          sarif_file: build/reports/detekt/detekt.sarif

  js-lint:
    name: JavaScript lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
      - run: pnpm i --frozen-lockfile
        working-directory: frontend

      # setup-node configures an eslint problem matcher ootb
      - run: pnpm run lint
        working-directory: frontend

  js-typecheck:
    name: JavaScript typechecking
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: jdx/mise-action@v4
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
      - run: pnpm i --frozen-lockfile
        working-directory: frontend
      # setup-node configures a tsc problem matcher ootb
      - run: pnpm run typecheck
        working-directory: frontend
