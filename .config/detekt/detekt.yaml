comments:
  DeprecatedBlockTag:
    active: true
  EndOfSentenceFormat:
    active: true
  KDocReferencesNonPublicProperty:
    active: true
  OutdatedDocumentation:
    active: true
  # TODO: Define whether we want to enforce documentation across the project or not.
  #       FWIW, documentation shows up in generated docs by SpringDoc.
  UndocumentedPublicClass:
    active: true
    severity: warning
    ignoreDefaultCompanionObject: true
    ignoreAnnotated:
      # Classes with these annotations have a clear semantic attached to them by design.
      # Accept them not being documented as a compromise to not cause "documentation fatigue"...
      - org.springframework.boot.autoconfigure.SpringBootApplication
      - org.springframework.stereotype.Service
      - org.springframework.stereotype.Entity
      - org.springframework.stereotype.Repository
      - org.elaastix.server.core.infrastructure.seed.Seeder
  UndocumentedPublicFunction:
    active: true
    severity: warning
    ignoreAnnotated:
      - org.springframework.context.annotation.Bean
      - org.springframework.stereotype.Repository  # Functions must have very explicit names, or be annotated with @Query
      - org.springframework.web.bind.annotation.ExceptionHandler  # One-liners most of the time
  UndocumentedPublicProperty:
    active: true
    severity: warning
    ignoreAnnotated:
      - org.elaastix.server.core.infrastructure.seed.Seeder  # Is the test data to use

complexity:
  LongParameterList:
    # Dependency Injection as well as declaring entities makes this lint rule too noisy and not very useful.
    active: false

ktlint:
  code_style: intellij_idea
  indentStyle: tab
  FunctionSignature:  # Detekt overrides this with `default` instead of the (better) default of Ktlint.
    functionBodyExpressionWrapping: multiline
  ValueParameterComment:
    active: false  # Annoying when adding comments after annotations. Wouldn't pass code review anyway.

performance:
  CouldBeSequence:
    active: true

style:
  # Allow to-do and fix-me comments (flagged by default)
  ForbiddenComment:
    comments: [ 'STOPSHIP:' ]
  ForbiddenImport:
    active: true
    forbiddenImports:
      # Enforce use of Kotlin-native types (or a type alias, when annotations are systematically needed...)
      - value: java.util.UUID
        reason: Use org.elaastix.commons.data.Uuid instead
      - value: kotlin.uuid.Uuid
        reason: Use org.elaastix.commons.data.Uuid instead
      - value: java.time.*
        reason: Use kotlin.time.* instead
      # Ban Spring Security's helper as we have our own
      - value: org.springframework.security.test.context.support.WithMockUser
        reason: Use testutils.WithMockUser instead
      # Ban footguns incompatible with parallel test execution
      - value: org.springframework.test.annotation.DirtiesContext
        reason: Banned annotation. @DirtiesContext is incompatible with parallel test execution
      - value: org.junit.jupiter.api.TestMethodOrder
        reason: Banned annotation. Tests are run in a randomised order to help fuzzing against race conditions
      # Bad types
      - value: io.swagger.v3.oas.models.media.UUIDSchema
        reason: We do not send UUIDs according to the `format=uuid` schema. Use Use org.elaastix.commons.openapi.UuidSchema instead
    excludes:
      - "**/commons/jpa/**"                                        # Compat layer
      - "**/commons/data/Uuid.kt"                                  # Uuid type alias
      - "**/server/core/infrastructure/config/SchedulerConfig.kt"  # Java Clock glue code
      - "**/testutils/ControllableClock.kt"                        # Java Clock glue code
  AbstractClassCanBeConcreteClass:
    active: false
  VarCouldBeVal:
    ignoreLateinitVar: true
